<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TaskFlow – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 0.3rem; }
        p.subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 0.6rem; text-align: center; cursor: pointer; color: #94a3b8; font-weight: 600; }
        .tab.active { color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        label { display: block; color: #cbd5e1; font-size: 0.85rem; margin-bottom: 0.4rem; }
        input { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f1f5f9; font-size: 0.95rem; margin-bottom: 1.2rem; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 0.8rem; background: #38bdf8; color: #0f172a; font-weight: 700; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #7dd3fc; }
        .error { color: #f87171; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
        .success { color: #4ade80; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>TaskFlow</h1>
    <p class="subtitle">Manage your tasks efficiently</p>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login', event)">Sign In</div>
        <div class="tab" onclick="switchTab('register', event)">Register</div>
    </div>
    <div id="loginForm">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" />
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
        <button onclick="login()">Sign In</button>
        <p class="error" id="loginError">Invalid username or password</p>
    </div>
    <div id="registerForm" style="display:none">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username" />
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
        <button onclick="register()">Create Account</button>
        <p class="error" id="registerError">Registration failed</p>
        <p class="success" id="registerSuccess">Account created! Redirecting...</p>
    </div>
</div>
<script>
    function switchTab(tab, event) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }
    async function login() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        try {
            const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (!res.ok) throw new Error();
            const data = await res.json();
            localStorage.setItem('token', data.token);
            window.location.href = '/tasks.html';
        } catch { document.getElementById('loginError').style.display = 'block'; }
    }
    async function register() {
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        try {
            const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (!res.ok) throw new Error();
            const data = await res.json();
            localStorage.setItem('token', data.token);
            document.getElementById('registerSuccess').style.display = 'block';
            setTimeout(() => window.location.href = '/tasks.html', 1500);
        } catch { document.getElementById('registerError').style.display = 'block'; }
    }
</script>
</body>
</html>
