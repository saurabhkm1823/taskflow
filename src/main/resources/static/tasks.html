<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TaskFlow – Tasks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        nav {
            background: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        nav h1 { color: #38bdf8; font-size: 1.4rem; }

        nav button {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        nav button:hover { border-color: #f87171; color: #f87171; }

        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

        .form-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
        }

        .form-card h2 { color: #94a3b8; font-size: 1rem; margin-bottom: 1rem; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.2s;
            font-family: inherit;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        input:focus, select:focus, textarea:focus { border-color: #38bdf8; }

        textarea { resize: vertical; min-height: 70px; }

        select option { background: #1e293b; }

        label.field-label {
            display: block;
            color: #64748b;
            font-size: 0.78rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-add {
            width: 100%;
            padding: 0.75rem;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .btn-add:hover { background: #7dd3fc; }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .tasks-header h2 { color: #94a3b8; font-size: 1rem; }

        .task-count {
            background: #334155;
            color: #94a3b8;
            font-size: 0.8rem;
            padding: 0.2rem 0.7rem;
            border-radius: 99px;
        }

        .task-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            transition: border 0.2s;
        }

        .task-card:hover { border-color: #475569; }

        .task-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .task-info { flex: 1; }

        .task-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 0.3rem;
        }

        .task-desc {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0.6rem;
        }

        .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.6rem; }

        .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            border-radius: 99px;
            font-weight: 600;
        }

        .badge-TODO        { background: #1e3a5f; color: #60a5fa; }
        .badge-IN_PROGRESS { background: #3b2f00; color: #fbbf24; }
        .badge-DONE        { background: #14532d; color: #4ade80; }
        .badge-LOW         { background: #1e293b; color: #64748b; border: 1px solid #334155; }
        .badge-MEDIUM      { background: #2d1b00; color: #f97316; }
        .badge-HIGH        { background: #3b0a0a; color: #f87171; }

        /* TIMER ROW */
        .timer-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .timer-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
        }

        .timer-icon { font-size: 0.9rem; }

        .timer-label { color: #475569; }

        .timer-value { color: #94a3b8; font-weight: 500; }

        .timer-value.running {
            color: #4ade80;
            animation: pulse 1.5s infinite;
        }

        .countdown {
            font-size: 0.78rem;
            margin-top: 0.4rem;
            padding: 0.25rem 0.7rem;
            border-radius: 99px;
            display: inline-block;
            font-weight: 600;
        }

        .countdown.overdue  { background: #3b0a0a; color: #f87171; }
        .countdown.soon     { background: #3b2f00; color: #fbbf24; }
        .countdown.ontrack  { background: #14532d; color: #4ade80; }
        .countdown.notime   { background: #1e293b; color: #475569; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .task-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

        .btn-edit, .btn-delete {
            padding: 0.4rem 0.9rem;
            border-radius: 7px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-edit   { background: #1e3a5f; color: #60a5fa; }
        .btn-delete { background: #3b0a0a; color: #f87171; }
        .btn-edit:hover, .btn-delete:hover { opacity: 0.8; }

        .empty {
            text-align: center;
            color: #475569;
            padding: 3rem;
            font-size: 0.95rem;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border-radius: 14px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid #334155;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 { color: #38bdf8; margin-bottom: 1.2rem; font-size: 1.1rem; }

        .modal-field { margin-bottom: 0.9rem; }

        .modal-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .btn-save {
            flex: 1;
            padding: 0.75rem;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            padding: 0.75rem;
            background: #334155;
            color: #94a3b8;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav>
    <h1>⚡ TaskFlow</h1>
    <button onclick="logout()">Logout</button>
</nav>

<div class="container">

    <!-- ADD TASK FORM -->
    <div class="form-card">
        <h2>ADD NEW TASK</h2>
        <div class="form-row">
            <div>
                <label class="field-label">Task Title</label>
                <input type="text" id="title" placeholder="e.g. Complete DSA sheet" />
            </div>
            <div>
                <label class="field-label">Priority</label>
                <select id="priority">
                    <option value="LOW">Low Priority</option>
                    <option value="MEDIUM" selected>Medium Priority</option>
                    <option value="HIGH">High Priority</option>
                </select>
            </div>
        </div>
        <div class="form-row" style="margin-bottom:0.8rem;">
            <div>
                <label class="field-label">Description</label>
                <textarea id="description" placeholder="Optional description"></textarea>
            </div>
            <div>
                <label class="field-label">Status</label>
                <select id="status">
                    <option value="TODO" selected>To Do</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="DONE">Done</option>
                </select>
            </div>
        </div>
        <div class="form-row-3">
            <div>
                <label class="field-label">⏱ Start Time</label>
                <input type="datetime-local" id="startTime" />
            </div>
            <div>
                <label class="field-label">🏁 End Time</label>
                <input type="datetime-local" id="endTime" />
            </div>
            <div style="display:flex; align-items:flex-end;">
                <button class="btn-add" onclick="setNowAsStart()" style="background:#334155; color:#94a3b8; margin:0;">
                    Set Start = Now
                </button>
            </div>
        </div>
        <button class="btn-add" onclick="createTask()">+ Add Task</button>
    </div>

    <!-- TASK LIST -->
    <div class="tasks-header">
        <h2>YOUR TASKS</h2>
        <span class="task-count" id="task-count">0 tasks</span>
    </div>
    <div id="task-list"></div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2>✏️ Edit Task</h2>
        <div class="modal-field">
            <label class="field-label">Title</label>
            <input type="text" id="edit-title" />
        </div>
        <div class="modal-field">
            <label class="field-label">Description</label>
            <textarea id="edit-description"></textarea>
        </div>
        <div class="modal-field">
            <label class="field-label">Status</label>
            <select id="edit-status">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
            </select>
        </div>
        <div class="modal-field">
            <label class="field-label">Priority</label>
            <select id="edit-priority">
                <option value="LOW">Low Priority</option>
                <option value="MEDIUM">Medium Priority</option>
                <option value="HIGH">High Priority</option>
            </select>
        </div>
        <div class="modal-field">
            <label class="field-label">⏱ Start Time</label>
            <input type="datetime-local" id="edit-startTime" />
        </div>
        <div class="modal-field">
            <label class="field-label">🏁 End Time</label>
            <input type="datetime-local" id="edit-endTime" />
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/index.html';

    let editingId = null;

    const headers = {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
    };

    // Set start time to now
    function setNowAsStart() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('startTime').value = now.toISOString().slice(0, 16);
    }

    // Format datetime for display
    function formatTime(str) {
        if (!str) return null;
        const d = new Date(str);
        return d.toLocaleString('en-IN', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit', hour12: true
        });
    }

    // Countdown/status pill
    function getCountdown(startTime, endTime, status) {
        if (status === 'DONE') return '<span class="countdown ontrack">✅ Completed</span>';
        if (!endTime) return '<span class="countdown notime">No deadline set</span>';

        const now = new Date();
        const end = new Date(endTime);
        const diff = end - now;

        if (diff < 0) return '<span class="countdown overdue">⚠️ Overdue by ' + formatDiff(-diff) + '</span>';
        if (diff < 3600000) return '<span class="countdown soon">🔥 Due in ' + formatDiff(diff) + '</span>';
        return '<span class="countdown ontrack">⏳ ' + formatDiff(diff) + ' remaining</span>';
    }

    function formatDiff(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        if (h > 24) return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
        if (h > 0) return h + 'h ' + m + 'm';
        return m + 'm';
    }

    // Convert datetime-local value to backend string
    function toBackendTime(val) {
        return val ? val.replace('T', ' ') + ':00' : null;
    }

    // Convert backend string to datetime-local value
    function toInputTime(str) {
        if (!str) return '';
        return str.replace(' ', 'T').slice(0, 16);
    }

    // ── LOAD TASKS ───────────────────────────────────────────────
    async function loadTasks() {
        const res = await fetch('/api/tasks', { headers });
        const tasks = await res.json();

        const list = document.getElementById('task-list');
        const count = document.getElementById('task-count');
        count.textContent = tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');

        if (tasks.length === 0) {
            list.innerHTML = '<div class="empty">No tasks yet — add one above!</div>';
            return;
        }

        list.innerHTML = tasks.map(t => `
        <div class="task-card">
          <div class="task-top">
            <div class="task-info">
              <div class="task-title">${t.title}</div>
              <div class="task-desc">${t.description || 'No description'}</div>
              <div class="badges">
                <span class="badge badge-${t.status}">${t.status.replace('_', ' ')}</span>
                <span class="badge badge-${t.priority}">${t.priority}</span>
              </div>
              <div class="timer-row">
                <div class="timer-item">
                  <span class="timer-icon">⏱</span>
                  <span class="timer-label">Start:</span>
                  <span class="timer-value ${t.startTime && t.status === 'IN_PROGRESS' ? 'running' : ''}">
                    ${formatTime(t.startTime) || 'Not set'}
                  </span>
                </div>
                <div class="timer-item">
                  <span class="timer-icon">🏁</span>
                  <span class="timer-label">End:</span>
                  <span class="timer-value">${formatTime(t.endTime) || 'Not set'}</span>
                </div>
              </div>
              ${getCountdown(t.startTime, t.endTime, t.status)}
            </div>
            <div class="task-actions">
              <button class="btn-edit" onclick="openEdit(
                ${t.id},
                \`${t.title}\`,
                \`${t.description || ''}\`,
                '${t.status}',
                '${t.priority}',
                '${t.startTime || ''}',
                '${t.endTime || ''}'
              )">Edit</button>
              <button class="btn-delete" onclick="deleteTask(${t.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── CREATE TASK ──────────────────────────────────────────────
    async function createTask() {
        const title = document.getElementById('title').value.trim();
        if (!title) { alert('Please enter a task title'); return; }

        await fetch('/api/tasks', {
            method: 'POST',
            headers,
            body: JSON.stringify({
                title,
                description: document.getElementById('description').value,
                status: document.getElementById('status').value,
                priority: document.getElementById('priority').value,
                startTime: toBackendTime(document.getElementById('startTime').value),
                endTime: toBackendTime(document.getElementById('endTime').value)
            })
        });

        document.getElementById('title').value = '';
        document.getElementById('description').value = '';
        document.getElementById('status').value = 'TODO';
        document.getElementById('priority').value = 'MEDIUM';
        document.getElementById('startTime').value = '';
        document.getElementById('endTime').value = '';

        loadTasks();
    }

    // ── DELETE TASK ──────────────────────────────────────────────
    async function deleteTask(id) {
        if (!confirm('Delete this task?')) return;
        await fetch('/api/tasks/' + id, { method: 'DELETE', headers });
        loadTasks();
    }

    // ── EDIT MODAL ───────────────────────────────────────────────
    function openEdit(id, title, description, status, priority, startTime, endTime) {
        editingId = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-description').value = description;
        document.getElementById('edit-status').value = status;
        document.getElementById('edit-priority').value = priority;
        document.getElementById('edit-startTime').value = toInputTime(startTime);
        document.getElementById('edit-endTime').value = toInputTime(endTime);
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        editingId = null;
    }

    async function saveEdit() {
        await fetch('/api/tasks/' + editingId, {
            method: 'PUT',
            headers,
            body: JSON.stringify({
                title: document.getElementById('edit-title').value,
                description: document.getElementById('edit-description').value,
                status: document.getElementById('edit-status').value,
                priority: document.getElementById('edit-priority').value,
                startTime: toBackendTime(document.getElementById('edit-startTime').value),
                endTime: toBackendTime(document.getElementById('edit-endTime').value)
            })
        });
        closeModal();
        loadTasks();
    }

    // ── LOGOUT ───────────────────────────────────────────────────
    function logout() {
        localStorage.removeItem('token');
        window.location.href = '/index.html';
    }

    // Refresh countdown every minute
    setInterval(loadTasks, 60000);

    loadTasks();
</script>

</body>
</html>
